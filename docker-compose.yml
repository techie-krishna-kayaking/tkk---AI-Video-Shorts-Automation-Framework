version: "3.8"

services:
  shorts-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shorts-ai
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - ./assets:/app/assets
      - ./configs:/app/configs
      - ./logs:/app/logs
      - ./temp:/app/temp
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    command: ["watch"]

  # One-shot processing mode
  shorts-ai-process:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shorts-ai-process
    profiles:
      - process
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - ./assets:/app/assets
      - ./configs:/app/configs
      - ./logs:/app/logs
      - ./temp:/app/temp
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint: ["python", "-m", "app.main", "batch", "input/tutorials"]

  # Upload scheduler
  shorts-ai-uploader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shorts-ai-uploader
    profiles:
      - upload
    volumes:
      - ./output:/app/output
      - ./configs:/app/configs
      - ./logs:/app/logs
      - ./temp:/app/temp
    entrypoint: ["python", "-m", "app.main", "execute-schedule"]

# ====================================================
# AI Video Shorts Automation - Application Config
# ====================================================

app:
  name: "AI Video Shorts Automation"
  version: "1.0.0"
  temp_dir: "temp"
  log_dir: "logs"
  log_level: "INFO"

input:
  base_dir: "input"

output:
  base_dir: "output"
  format: "mp4"
  naming_pattern: "{video_name}_part{number:03d}"

video:
  output_width: 1080
  output_height: 1920
  fps: 30
  codec: "h264"
  audio_codec: "aac"
  audio_bitrate: "256k"
  video_bitrate: "16M"
  preset: "slow"
  crf: 16

shorts:
  min_duration: 15
  max_duration: 90
  target_duration: 60
  silence_threshold: -40
  silence_min_duration: 2.0
  overlap_seconds: 0.5

transcription:
  model: "base"
  language: "en"
  word_timestamps: true
  device: "auto"

captions:
  enabled: true
  style: "modern"
  font: "assets/fonts/Montserrat-Bold.ttf"
  font_size: 48
  font_color: "#FFFFFF"
  outline_color: "#000000"
  outline_width: 3
  position: "center"
  max_words_per_line: 6

rendering:
  gpu_enabled: true
  gpu_encoder: "h264_nvenc"
  cpu_encoder: "libx264"
  threads: 0
  hwaccel: "cuda"

processing:
  batch_size: 5
  max_workers: 2
  retry_attempts: 3
  retry_delay: 5

watcher:
  enabled: false
  poll_interval: 10
  recursive: true

assets:
  social_dir: "assets/social"
  fonts_dir: "assets/fonts"
  overlays_dir: "assets/overlays"

trip:
  photo_duration: 4.0
  ken_burns_enabled: true
  blur_background_enabled: true
  instagram_music_volume: 0.2
  trending_audio_count: 100
  cleanup_after_upload: true
  output_width: 3840
  output_height: 2160
  instagram_trending_manifest: "configs/trending_audio_instagram.json"
  youtube_trending_manifest: "configs/trending_audio_youtube.json"
  trending_provider:
    enabled: false
    provider_type: "filesystem"
    source_dir: "assets/audio/trending"
    source_manifest_url: ""
    auth_env_var: ""
    download_dir: "assets/audio/ingested"
    request_timeout_seconds: 30
    pixabay_api_key_env: "PIXABAY_API_KEY"
    pixabay_category: "music"
    pixabay_order: "popular"

# ====================================================
# Channel Configuration
# ====================================================
# Each channel maps to an input folder, output folder,
# and a socials overlay image for branding.
# ====================================================

channels:
  krgd_vlogs:
    name: "krgd vlogs"
    type: "vlog"
    youtube_url: "https://www.youtube.com/@krgd_vlogs"
    input_folder: "input/krgd_vlogs"
    output_folder: "output/krgd_vlogs"
    socials_file: "assets/social/krgd_vlogs.png"
    intro_text: ""
    hook_keywords:
      - "amazing"
      - "incredible"
      - "look at this"
      - "adventure"
    upload_enabled: true
    youtube:
      client_secrets: "configs/client_secret_krgd_vlogs.json"
      credentials: "configs/credentials_krgd_vlogs.json"
      default_tags:
        - "vlog"
        - "gopro"
        - "travel"
        - "adventure"
      default_category: "19"
      privacy_status: "private"
      schedule_delay_hours: 48
      schedule_times:
        - "13:07"
        - "15:07"
        - "17:07"
        - "21:07"
      schedule_duration_days: 10

  techie_krishna_kayaking:
    name: "techie krishna kayaking"
    type: "tutorial"
    youtube_url: "https://www.youtube.com/@TechieKrishnaKayaking"
    input_folder: "input/techie_krishna_kayaking"
    output_folder: "output/techie_krishna_kayaking"
    socials_file: "assets/social/tkk_socials.png"
    intro_text: "Learn Faster"
    hook_keywords:
      - "how to"
      - "mistake"
      - "shortcut"
      - "tip"
      - "secret"
      - "why"
      - "important"
      - "trick"
      - "hack"
    upload_enabled: true
    youtube:
      client_secrets: "configs/client_secret_techie_krishna_kayaking.json"
      credentials: "configs/credentials_techie_krishna_kayaking.json"
      default_tags:
        - "tutorial"
        - "tech"
        - "kayaking"
      default_category: "28"
      privacy_status: "private"
      schedule_delay_hours: 24
      schedule_times:
        - "13:07"
        - "15:07"
        - "17:07"
        - "21:07"
      schedule_duration_days: 10
      auto_upload_captions: true
      monetization_enabled: true
      made_for_kids: false
      license_type: "youtube"

  krishna_kayaking:
    name: "Krishna kayaking"
    type: "gopro"
    youtube_url: "https://www.youtube.com/@krishnakayaking"
    input_folder: "input/krishna_kayaking"
    output_folder: "output/krishna_kayaking"
    socials_file: "assets/social/kk_socials.png"
    intro_text: ""
    hook_keywords:
      - "kayaking"
      - "river"
      - "rapids"
      - "adventure"
    upload_enabled: true
    youtube:
      client_secrets: "configs/client_secret_krishna_kayaking.json"
      credentials: "configs/credentials_krishna_kayaking.json"
      default_tags:
        - "kayaking"
        - "adventure"
        - "river"
      default_category: "17"
      privacy_status: "private"
      schedule_delay_hours: 24
      schedule_times:
        - "13:07"
        - "15:07"
        - "17:07"
        - "21:07"
      schedule_duration_days: 10

  tkk_live_shorts:
    name: "TKK Live & Shorts"
    type: "tutorial"
    youtube_url: "https://www.youtube.com/@TKKLiveShorts"
    input_folder: "input/tkk_live_shorts"
    output_folder: "output/tkk_live_shorts"
    socials_file: "assets/social/tkk_socials.png"
